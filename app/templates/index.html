<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Market Research Analyst</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .upload-area {
            border: 3px dashed #ccc;
            border-radius: 10px;
            padding: 40px 20px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .upload-area i {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 15px;
            display: block;
        }

        .file-name {
            color: #333;
            font-weight: 500;
            margin: 10px 0;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            margin-bottom: 10px;
        }

        button:hover {
            background: #764ba2;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error {
            color: #dc3545;
            padding: 10px;
            background: #f8d7da;
            border-radius: 5px;
            display: none;
            margin-bottom: 15px;
        }

        /* History Section */
        .history-section {
            margin-top: 40px;
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 30px;
            display: none;
        }

        .history-title {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .clear-btn {
            font-size: 0.8rem;
            color: #999;
            cursor: pointer;
            border: none;
            background: none;
            width: auto;
            text-decoration: underline;
            margin: 0;
        }

        .clear-btn:hover {
            color: #dc3545;
        }

        .history-list {
            list-style: none;
        }

        .history-item {
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background: #eef2ff;
            border-color: #667eea;
        }

        .history-item-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
        }

        .history-item-date {
            font-size: 0.75rem;
            color: #999;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📊 AI Market Analyst</h1>
        <p class="subtitle">Upload a business report PDF for strategic insights</p>

        <div class="upload-area" id="uploadArea">
            <i>📁</i>
            <p><strong>Drag & drop your PDF here</strong></p>
            <p>or click to browse</p>
            <input type="file" id="fileInput" accept=".pdf" style="display: none;">
        </div>

        <div class="file-name" id="fileName"></div>
        <button id="analyzeBtn" disabled>Analyze Report</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing report... (15-30s)</p>
        </div>

        <div class="error" id="error"></div>

        <!-- History Section -->
        <div class="history-section" id="historySection">
            <div class="history-title">
                Recent Analyses
                <button class="clear-btn" onclick="clearHistory()">Clear History</button>
            </div>
            <ul class="history-list" id="historyList"></ul>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');

        let selectedFile = null;

        document.addEventListener('DOMContentLoaded', updateHistoryUI);

        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFileSelect(e.target.files[0]));

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#667eea';
            uploadArea.style.background = '#f8f9ff';
        });

        uploadArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#ccc';
            uploadArea.style.background = 'white';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#ccc';
            uploadArea.style.background = 'white';
            if (e.dataTransfer.files.length) handleFileSelect(e.dataTransfer.files[0]);
        });

        function handleFileSelect(file) {
            if (!file || !file.name.toLowerCase().endsWith('.pdf')) {
                showError('Please select a valid PDF file');
                return;
            }
            selectedFile = file;
            fileName.textContent = `Selected: ${file.name}`;
            analyzeBtn.disabled = false;
            hideError();
        }

        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            loading.style.display = 'block';
            analyzeBtn.disabled = true;
            hideError();

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/api/analyze', { method: 'POST', body: formData });
                const result = await response.json();
                if (result.success) {
                    sessionStorage.setItem('analysisResults', JSON.stringify(result.data));
                    window.location.href = '/results';
                } else {
                    showError(result.error || 'Analysis failed');
                }
            } catch (err) {
                showError('Network error: ' + err.message);
            } finally {
                loading.style.display = 'none';
                analyzeBtn.disabled = false;
            }
        });

        function updateHistoryUI() {
            const history = JSON.parse(localStorage.getItem('analysisHistory') || '[]');
            const section = document.getElementById('historySection');
            const list = document.getElementById('historyList');

            if (history.length) {
                section.style.display = 'block';
                list.innerHTML = history.map(item => `
                    <li class="history-item" onclick="loadHistoryItem(${item.id})">
                        <span class="history-item-title">${item.current_business_situation}</span>
                        <span class="history-item-date">${new Date(item.timestamp).toLocaleString()}</span>
                    </li>
                `).join('');
            } else {
                section.style.display = 'none';
            }
        }

        function loadHistoryItem(id) {
            const history = JSON.parse(localStorage.getItem('analysisHistory') || '[]');
            const item = history.find(h => h.id === id);
            if (item) {
                // Ensure same format as API response
                sessionStorage.setItem('analysisResults', JSON.stringify({
                    current_business_situation: item.current_business_situation,
                    strong_points: item.strong_points,
                    weak_points: item.weak_points,
                    smart_suggestions: item.smart_suggestions,
                    next_strategic_moves: item.next_strategic_moves
                }));
                window.location.href = '/results';
            }
        }

        function clearHistory() {
            if (confirm('Clear analysis history?')) {
                localStorage.removeItem('analysisHistory');
                updateHistoryUI();
            }
        }

        function showError(message) { error.textContent = message; error.style.display = 'block'; }
        function hideError() { error.style.display = 'none'; }
    </script>
</body>

</html>
